name = "wangzhan-blog-api"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[env.production]
name = "wangzhan-blog-api-production"

# ===========================================
# Cloudflare Pages Functions Configuration
# ===========================================
#
# This configuration is for local development with Wrangler.
# For production deployment on Cloudflare Pages:
# 1. Create KV namespace in Cloudflare Dashboard
# 2. Bind KV namespace to your Pages project
# 3. Set environment variables in Pages project settings
#

# KV Namespace Configuration
# --------------------------
# Create a KV namespace named "BLOG_DATA" in Cloudflare Dashboard:
# 1. Go to Workers & Pages → KV
# 2. Click "Create a namespace"
# 3. Name it "BLOG_DATA"
# 4. Copy the namespace ID and replace below
[[kv_namespaces]]
binding = "BLOG_DATA"
id = "your-kv-namespace-id-here"          # Replace with your production KV namespace ID
preview_id = "your-preview-kv-namespace-id" # Replace with your preview KV namespace ID

# Environment Variables
# --------------------
# Generate a secure API key using:
#   openssl rand -hex 32
# or visit: https://www.random.org/strings/
[vars]
API_KEY = "your-secret-api-key-here"      # Change to a secure random string

# Deployment Notes
# ---------------
# 1. Functions are automatically detected from the `functions/` directory
# 2. For production deployment on Cloudflare Pages:
#    - Push this repository to GitHub
#    - Connect to Cloudflare Pages
#    - Configure KV bindings in Pages project settings
#    - Set environment variables in Pages project settings
#
# 3. For local development:
#    - Install Wrangler: npm install -g wrangler
#    - Login: wrangler login
#    - Update KV namespace IDs above
#    - Run: wrangler pages dev . --port 8787
#
# 4. API Endpoints:
#    - GET    /api/blogs         - List all blogs
#    - POST   /api/blogs         - Create new blog (requires X-API-Key)
#    - GET    /api/blogs/:id     - Get specific blog
#    - PUT    /api/blogs/:id     - Update blog (requires X-API-Key)
#    - DELETE /api/blogs/:id     - Delete blog (requires X-API-Key)
#    - GET    /api/health        - Health check endpoint