<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - 1³ Machine</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .blog-detail {
            padding: 60px 0;
            background-color: #fff;
        }

        .blog-detail .container {
            flex-direction: column;
            align-items: flex-start;
            max-width: 800px;
        }

        .blog-header {
            width: 100%;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .blog-date {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .blog-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            line-height: 1.3;
        }

        .blog-content {
            width: 100%;
            font-size: 16px;
            line-height: 1.8;
            color: #333;
        }

        .blog-content h1,
        .blog-content h2,
        .blog-content h3 {
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            color: #333;
        }

        .blog-content h1 {
            font-size: 28px;
        }

        .blog-content h2 {
            font-size: 24px;
        }

        .blog-content h3 {
            font-size: 20px;
        }

        .blog-content p {
            margin-bottom: 1.5em;
        }

        .blog-content ul,
        .blog-content ol {
            margin-left: 20px;
            margin-bottom: 1.5em;
        }

        .blog-content li {
            margin-bottom: 0.5em;
        }

        .blog-content a {
            color: #e60000;
            text-decoration: underline;
        }

        .blog-content img {
            max-width: 100%;
            height: auto;
            margin: 20px 0;
            border-radius: 4px;
        }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            padding: 10px 20px;
            background-color: #f8f8f8;
            color: #333;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .back-link:hover {
            background-color: #e0e0e0;
        }

        @media (max-width: 768px) {
            .blog-title {
                font-size: 24px;
            }

            .blog-content {
                font-size: 15px;
            }
        }

        .blog-navigation {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .blog-nav-link {
            padding: 10px 20px;
            background-color: #f8f8f8;
            color: #333;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: background-color 0.3s;
            display: inline-block;
        }

        .blog-nav-link:hover {
            background-color: #e0e0e0;
        }

        .blog-nav-link.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
        }

        .related-blogs {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #e0e0e0;
        }

        .related-blogs h3 {
            margin-bottom: 20px;
            color: #333;
            font-size: 20px;
        }

        .related-blogs-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .related-blog-item {
            padding: 20px;
            background-color: #f8f8f8;
            border-radius: 4px;
            transition: transform 0.3s, background-color 0.3s;
        }

        .related-blog-item:hover {
            transform: translateY(-5px);
            background-color: #f0f0f0;
        }

        .related-blog-item h4 {
            margin-bottom: 10px;
            color: #333;
            font-size: 16px;
        }

        .related-blog-item p {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .related-blog-link {
            color: #e60000;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }

        .related-blog-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .blog-navigation {
                margin-top: 30px;
                padding-top: 15px;
            }

            .blog-nav-link {
                padding: 8px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

        </div>
        <div class="header-main">

                <div class="logo">
                    <a href="index.html">
                        <img src="logo.svg" alt="13machine">
                        <span>1³ MACHINE</span>
                    </a>
                </div>
                <div class="search">
                    <input type="text" placeholder="Search">
                    <button type="submit">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                        </svg>

            </div>
        </div>
        <nav>
            <div class="container">
                <ul>
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="services.html">SERVICES</a></li>
                    <li><a href="solutions.html">SOLUTIONS</a></li>
                    <li><a href="about.html">ABOUT US</a></li>
                    <li><a href="insights.html">INSIGHTS</a></li>
                    <li><a href="contact.html">CONTACT</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="blog-detail">
            <div class="container">
                <div class="blog-header">
                    <div class="blog-date" id="blogDate"></div>
                    <h1 class="blog-title" id="blogTitle"></h1>
                </div>

                <div class="blog-content" id="blogContent">
                    <!-- Blog content will be loaded here -->
                </div>

                <div class="blog-navigation" id="blogNavigation">
                    <div class="nav-container">
                        <a href="#" id="prevBlog" class="blog-nav-link">← Previous</a>
                        <a href="#" id="nextBlog" class="blog-nav-link">Next →</a>

                </div>

                <div class="related-blogs" id="relatedBlogs">
                    <h3>You Might Also Like</h3>
                    <div class="related-blogs-container" id="relatedBlogsContainer">

                <a href="index.html" class="back-link">← Back to Home</a>

        </section>
    </main>

                </div>
                <div class="footer-links">

                    <a href="mailto:nathan180533@gmail.com">Email</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 1³ Machine. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
